<!doctype html>
<html lang="ru">
<head>
  <script src="script.js" defer></script>
  <link rel="stylesheet" href="styles.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
</head>
<body>
    <h1>Мой Todo</h1>
    <div class="taskManager">
      <div class="taskInputGroup">
        <label for="taskInput"></label>
        <div class="taskInputRow">
          <input id="taskInput" type="text" placeholder="Введите задачу" />
          <button id="addBtn" type="button">Добавить</button>
        </div>
        <div id="taskError" class="fieldError" aria-live="polite"></div>
      </div>
    </div>
    <ul id="taskList"></ul>
</body>
</html>
